<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>デモデータ読み込み中...</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f7f5f2; flex-direction: column; gap: 12px; }
    p { color: #555; font-size: 1.1rem; }
    small { color: #aaa; font-size: 0.8rem; }
  </style>
</head>
<body>
<p>2025年・1年分のデモデータを読み込んでいます…</p>
<small>完了後、自動でページが切り替わります</small>
<script>
function seededRand(seed) {
  var s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}

function lerpColor(a, b, t) {
  var c1 = hexToRgb(a), c2 = hexToRgb(b);
  var r = Math.round(c1[0]+(c2[0]-c1[0])*t);
  var g = Math.round(c1[1]+(c2[1]-c1[1])*t);
  var bl = Math.round(c1[2]+(c2[2]-c1[2])*t);
  return "#"+r.toString(16).padStart(2,"0")+g.toString(16).padStart(2,"0")+bl.toString(16).padStart(2,"0");
}

function getDaysInMonth(y, m) { return new Date(y, m, 0).getDate(); }

// 季節の流れを感じる色設計（隣月と自然につながるグラデーション）
var monthPalettes = [
  {a:"#a8d8f0", b:"#c8d6e5"},  // 1月: 冬の青白
  {a:"#b2c8d4", b:"#c9e4f0"},  // 2月: 薄氷
  {a:"#ffd6e0", b:"#a8c8d8"},  // 3月: 春の入口
  {a:"#ffb8c6", b:"#a8e6cf"},  // 4月: 桜〜新緑
  {a:"#a8e6cf", b:"#f9ca24"},  // 5月: 若葉〜菜の花
  {a:"#74b9ff", b:"#55efc4"},  // 6月: 梅雨の水色
  {a:"#ffa94d", b:"#ff6b6b"},  // 7月: 真夏
  {a:"#ff6b6b", b:"#fdcb6e"},  // 8月: 灼熱〜夕暮れ
  {a:"#fdcb6e", b:"#e17055"},  // 9月: 実りの秋
  {a:"#e17055", b:"#d63031"},  // 10月: 紅葉
  {a:"#c0392b", b:"#8e44ad"},  // 11月: 深まる秋
  {a:"#6c5ce7", b:"#a8d8f0"},  // 12月: 冬の夜〜冬の空
];

// 特別な日の色（感情の起伏）
var specialColors = [
  "#2d3436","#ff9ff3","#f9ca24","#6c5ce7","#00cec9",
  "#fd79a8","#00b894","#e84393","#ffeaa7","#636e72"
];

var memos = {
  1:["新年の清々しい空気を吸いながら散歩した。","お雑煮を作った。出汁の香りが心地よかった。","寒さが厳しかった。鍋が染みた。","夜空が澄んでいてオリオン座がよく見えた。","温かい紅茶を飲みながら日記を書いた。","静かな1日だった。それが心地よかった。","満月がとても大きく見えた。"],
  2:["節分で豆まきをした。","春一番が吹いた。コートが飛びそうになった。","梅の花が咲き始めていた。","ぬるくなった空気を感じた。春が近い。","夕方5時でもまだ明るくなってきた。"],
  3:["桜の蕾を見つけた。もうすぐだ。","花粉がつらいけど空気は気持ちいい。","桜並木を歩いた。最高だった。","春雨がしっとりと降っていた。","土の匂いがした。季節が変わる気配。"],
  4:["花びらが舞っていた。綺麗すぎて時間を忘れた。","お花見弁当を作って公園で食べた。","窓を開けて風を入れた。爽やかだった。","雨上がりの虹を見た。","ツバメを今年初めて見た。"],
  5:["山に登った。頂上からの景色が最高だった。","新緑の中でランチを食べた。","気持ちのいい風が吹いていた。","バラが咲いていた。甘い香りがした。","晴れた空が夏みたいに青かった。"],
  6:["梅雨入り。雨音が好きだと気づいた。","紫陽花が満開だった。","傘を忘れて濡れた。でも悪くなかった。","夜に蛍を見に行った。幻想的だった。","梅雨の晴れ間はとびきり気持ちいい。"],
  7:["七夕。短冊に願いを書いた。","夏祭りに行った。花火がきれいだった。","暑さが本格的になってきた。","かき氷を食べた。冷たくて幸せ。","夏の夜空に流れ星を見た。"],
  8:["お盆で帰省した。久しぶりの実家。","夕方の海岸を歩いた。風が気持ちよかった。","夏の終わりの気配をかすかに感じた。","蚊取り線香の匂いが夏だった。","向日葵畑に行った。元気をもらった。"],
  9:["金木犀の香りがした。秋の始まり。","涼しくなってきた。長袖を出した。","秋刀魚を焼いた。秋だなあ。","満月がとても美しかった。中秋の名月。","コスモスが揺れていた。"],
  10:["紅葉が始まった。山が色づいている。","秋晴れが続いて気持ちいい。","落ち葉を踏む音が好き。","銀杏が黄色くなってきた。","紅葉狩りに行った。息をのむ美しさだった。"],
  11:["木枯らし一号が吹いた。","鍋の季節になった。","夕暮れが早くなった。5時でもう暗い。","みかんを食べながらこたつに入った。","霜が降りた朝。空気が刺すように冷たい。"],
  12:["師走。街が慌ただしくなってきた。","大掃除を少しずつ始めた。","冬至。ゆず湯に入った。","今年最後の夕日を見た。","今年も色々あったな。来年も良い年にしたい。"]
};

var rand = seededRand(2025);
var entries = {};
var year = 2025;
var COVERAGE = 0.82; // 約82%の日に記録

for (var m = 1; m <= 12; m++) {
  var days = getDaysInMonth(year, m);
  var pal = monthPalettes[m-1];
  var memo = memos[m];

  for (var d = 1; d <= days; d++) {
    // 記録しない日を作る
    if (rand() > COVERAGE) continue;

    var dateStr = year+"-"+String(m).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    var color;

    // 約10%の確率で特別な色（感情の振れ幅）
    if (rand() < 0.10) {
      color = specialColors[Math.floor(rand() * specialColors.length)];
    } else {
      // 月の中での自然な流れ（月初→月末でグラデーション）
      var progress = (d - 1) / (days - 1);
      var base = lerpColor(pal.a, pal.b, progress);

      // ランダムな揺らぎを加える
      var rgb = hexToRgb(base);
      var v = 35;
      var nr = Math.min(255, Math.max(0, rgb[0] + Math.round((rand()-0.5)*v*2)));
      var ng = Math.min(255, Math.max(0, rgb[1] + Math.round((rand()-0.5)*v*2)));
      var nb = Math.min(255, Math.max(0, rgb[2] + Math.round((rand()-0.5)*v*2)));
      color = "#"+nr.toString(16).padStart(2,"0")+ng.toString(16).padStart(2,"0")+nb.toString(16).padStart(2,"0");
    }

    entries[dateStr] = {
      color: color,
      colorName: "",
      memo: memo[Math.floor(rand() * memo.length)]
    };
  }
}

var existing = {};
try { existing = JSON.parse(localStorage.getItem("color-diary-entries")) || {}; } catch(e) {}
for (var k in entries) existing[k] = entries[k];
localStorage.setItem("color-diary-entries", JSON.stringify(existing));
window.location.href = "index.html";
</script>
</body>
</html>
